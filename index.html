<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aura | Moda Feminina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#faf7f5;
color:#222;

}

header{

position:fixed;
top:0;
left:0;
width:100%;
background:white;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.05);
z-index:999;

}

.logo{

font-size:32px;
font-weight:700;
letter-spacing:2px;

}

nav a{

text-decoration:none;
color:#222;
margin-left:35px;
font-weight:500;
transition:.3s;

}

nav a:hover{

color:#d39a7b;

}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:0 30px;

background:linear-gradient(135deg,#ffffff,#f6efea);

}

.hero h1{

font-size:70px;

margin-bottom:20px;

}

.hero p{

font-size:22px;

max-width:700px;

margin:auto;

color:#666;

line-height:1.7;

}

.botao{

display:inline-block;

margin-top:40px;

padding:18px 45px;

background:#222;

color:white;

border-radius:50px;

text-decoration:none;

font-size:18px;

transition:.3s;

}

.botao:hover{

background:#d39a7b;

}

section{

padding:110px 8%;

}

.titulo{

text-align:center;

font-size:42px;

margin-bottom:70px;

}

</style>

</head>

<body>

<header>

<div class="logo">AURA</div>

<nav>

<a href="#">Home</a>

<a href="#">Coleção</a>

<a href="#">Sobre</a>

<a href="#">Contato</a>

</nav>

</header>

<section class="hero">

<div>

<h1>Vista sua melhor versão.</h1>

<p>

Moda feminina minimalista, elegante e criada para mulheres que gostam de se sentir bonitas todos os dias.

</p>

<a href="#" class="botao">Ver coleção</a>

</div>

</section>

<section>

<h2 class="titulo">

Mais Vendidas

</h2>

</section>

</body>

</html>
